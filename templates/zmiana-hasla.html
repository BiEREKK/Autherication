<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zmiana Hasła</title>
</head>
<body>
    <h2>Formularz zmiany hasła</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p style="color: red;">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/change-password" method="POST">
        <label for="current_password">Aktualne hasło:</label><br>
        <input type="password" id="current_password" name="current_password" required><br><br>

        <label for="new_password">Nowe hasło:</label><br>
        <input type="password" id="new_password" name="new_password" required><br><br>

        <label for="confirm_new_password">Powtórz nowe hasło:</label><br>
        <input type="password" id="confirm_new_password" name="confirm_new_password" required><br><br>

        <button type="submit">Zmień hasło</button>
    </form>

    <p><a href="/test-page">Anuluj i wróć do panelu</a></p>
</body>
</html>
